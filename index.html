<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>feita de pontos — um oráculo</title>
<style>
  :root{
    --bg:#0a0a0d;
    --ink:#e9e3d5;
    --dim:#8f8a7d;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow:hidden;
  }
  #stage{
    position:fixed; inset:0;
    display:block;
    cursor:crosshair;
  }

  /* identidade — canto superior esquerdo */
  .copy{
    position:fixed;
    left:clamp(20px, 4vw, 56px);
    top:clamp(20px, 4vh, 44px);
    pointer-events:none;
    user-select:none;
    text-shadow:0 0 10px rgba(6,6,9,.9), 0 0 22px rgba(6,6,9,.8);
  }
  .copy .eyebrow{
    font-size:10px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--dim);
    margin-bottom:10px;
  }
  .copy h1{
    font-family:Didot, "Bodoni MT", "Playfair Display", Georgia, serif;
    font-weight:400;
    font-size:clamp(22px, 2.6vw, 32px);
    line-height:1.05;
    font-style:italic;
  }
  .arcs{
    margin-top:14px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    pointer-events:auto;
  }
  .arcs button{
    background:transparent;
    border:1px solid rgba(143,138,125,.35);
    border-radius:14px;
    color:var(--dim);
    font-size:9px;
    letter-spacing:.22em;
    text-transform:uppercase;
    padding:6px 12px;
    cursor:pointer;
    transition:color .3s ease, border-color .3s ease;
    font-family:inherit;
  }
  .arcs button:hover{color:var(--ink);}
  .arcs button.on{color:var(--ink); border-color:rgba(233,227,213,.7);}

  .meta{
    position:fixed;
    top:clamp(20px, 4vh, 44px);
    right:clamp(20px, 4vw, 56px);
    text-align:right;
    font-size:10px;
    letter-spacing:.28em;
    text-transform:uppercase;
    color:var(--dim);
    pointer-events:none;
    user-select:none;
    line-height:2.1;
    text-shadow:0 0 10px rgba(6,6,9,.9), 0 0 22px rgba(6,6,9,.8);
  }
  .meta b{color:var(--ink); font-weight:400;}
  #estado{display:inline-block; transition:opacity .5s ease;}

  /* zona inferior: gradiente que ancora resposta e pergunta
     sem cobrir o rosto dela */
  .bottomfade{
    position:fixed;
    left:0; right:0; bottom:0;
    height:30vh;
    background:linear-gradient(to top,
      rgba(6,6,9,.82) 0%,
      rgba(6,6,9,.55) 40%,
      rgba(6,6,9,0) 100%);
    pointer-events:none;
    z-index:0;
  }

  /* o pensamento: painel central enquanto a mente formula */
  .thinking{
    position:fixed;
    left:50%; top:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    pointer-events:none;
    user-select:none;
    opacity:0;
    transition:opacity .6s ease;
    z-index:2;
  }
  .thinking.on{opacity:1;}
  .thinking .tname{
    font-family:Didot, "Bodoni MT", Georgia, serif;
    font-style:italic;
    font-size:clamp(18px, 2.2vw, 26px);
    color:var(--ink);
    text-shadow:0 0 20px rgba(6,6,9,.95), 0 0 40px rgba(6,6,9,.9);
    margin-bottom:10px;
  }
  .thinking .tphase{
    font-size:10px;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--dim);
    text-shadow:0 0 14px rgba(6,6,9,.95);
    margin-bottom:14px;
    min-height:12px;
  }
  .thinking .tbar{
    width:130px; height:1px;
    margin:0 auto;
    background:rgba(143,138,125,.25);
    overflow:hidden;
    position:relative;
  }
  .thinking .tbar i{
    position:absolute; inset:0;
    display:block;
    background:linear-gradient(90deg, transparent, var(--ink), transparent);
    transform:translateX(-100%);
    animation:sweep 1.6s ease-in-out infinite;
  }
  @keyframes sweep{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(100%);}
  }

  /* diálogo em colunas: fala nova à direita, anterior à esquerda */
  .answer{
    position:fixed;
    right:clamp(16px, 3.5vw, 56px);
    top:50%;
    transform:translateY(-50%);
    width:min(320px, 25vw);
    max-height:76vh;
    text-align:left;
    pointer-events:none;
    user-select:none;
    z-index:1;
  }
  .answer::before{
    content:'';
    position:absolute;
    inset:-22px -26px;
    background:radial-gradient(ellipse at center,
      rgba(6,6,9,.55) 0%, rgba(6,6,9,.3) 55%, rgba(6,6,9,0) 80%);
    opacity:0;
    transition:opacity 1.2s ease;
    z-index:-1;
  }
  .answer.on::before{opacity:1;}
  .prevbox{
    right:auto;
    left:clamp(16px, 3.5vw, 56px);
    opacity:0;
    transition:opacity .8s ease;
  }
  .prevbox.on{opacity:.72;}
  @media (max-width:900px){
    .prevbox{display:none !important;}
    .answer{
      right:50%;
      transform:translate(50%, 0);
      top:auto;
      bottom:clamp(92px, 15vh, 150px);
      width:min(560px, 88vw);
      text-align:center;
    }
  }
  .hotext{
    margin-top:16px;
    font-family:Didot, "Bodoni MT", "Playfair Display", Georgia, serif;
    font-style:italic;
    font-size:clamp(14px, 1.8vw, 18px);
    color:var(--ink);
    text-shadow:0 0 12px rgba(10,10,13,.95), 0 0 24px rgba(10,10,13,.9);
  }
  #handoff{display:none;}
  #handoff.on{display:block;}
  #deepBtn, #endBtn, #pdfBtn, #dossieBtn, .hobtn{
    display:none;
    margin-top:16px;
    background:transparent;
    border:1px solid rgba(143,138,125,.4);
    border-radius:20px;
    color:var(--dim);
    font-size:10px;
    letter-spacing:.26em;
    text-transform:uppercase;
    padding:8px 18px;
    cursor:pointer;
    pointer-events:auto;
    transition:color .3s ease, border-color .3s ease, opacity .4s ease;
    font-family:inherit;
  }
  #deepBtn:hover, #endBtn:hover, #pdfBtn:hover, #dossieBtn:hover, .hobtn:hover{color:var(--ink); border-color:rgba(233,227,213,.7);}
  #deepBtn.on, #endBtn.on, #pdfBtn.on, #dossieBtn.on{display:inline-block;}
  #dossieBtn{margin-left:10px; border-color:rgba(233,227,213,.55);}
  #pdfBtn{margin-left:10px;}
  .hobtn{display:inline-block; margin-left:6px; margin-right:6px;}
  #endBtn{margin-left:10px;}
  .answer .qecho{
    font-size:10px;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--dim);
    margin-bottom:8px;
    opacity:0;
    transition:opacity 1s ease;
    text-shadow:0 0 14px rgba(10,10,13,.95), 0 0 26px rgba(10,10,13,.9);
  }
  .answer .qecho.on{opacity:1;}
  .answer .text{
    font-family:Didot, "Bodoni MT", "Playfair Display", Georgia, serif;
    font-style:italic;
    font-weight:400;
    font-size:clamp(12.5px, 1.15vw, 15px);
    line-height:1.6;
    letter-spacing:.01em;
    text-shadow:0 0 12px rgba(10,10,13,.95), 0 0 24px rgba(10,10,13,.92), 0 0 42px rgba(10,10,13,.85);
  }
  .answer .text span{
    opacity:0;
    transition:opacity .7s ease;
  }
  .answer .text span.on{opacity:1;}
  .answer .fontes{
    margin-top:10px;
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size:10px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--dim);
    text-shadow:0 0 10px rgba(6,6,9,.9);
  }
  .answer .fontes a{color:var(--dim); text-decoration:underline dotted; pointer-events:auto;}
  .answer .fontes a:hover{color:var(--ink);}
  .answer .retorno{
    margin-top:14px;
    font-family:Didot, "Bodoni MT", "Playfair Display", Georgia, serif;
    font-style:italic;
    font-size:clamp(14px, 1.8vw, 18px);
    line-height:1.6;
    color:var(--ink);
    opacity:0;
    transition:opacity 1.6s ease;
    text-shadow:0 0 12px rgba(10,10,13,.95), 0 0 24px rgba(10,10,13,.9);
  }
  .answer .retorno.on{opacity:.95;}

  /* pergunta */
  .ask{
    position:fixed;
    align-items:flex-end;
    left:50%;
    bottom:clamp(22px, 5.5vh, 60px);
    transform:translateX(-50%);
    width:min(520px, 86vw);
    display:flex;
    align-items:center;
    gap:14px;
    background:rgba(6,6,9,.42);
    backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);
    padding:8px 20px;
    border-radius:16px;
    z-index:1;
  }
  .ask textarea{
    flex:1;
    background:transparent;
    border:none;
    border-bottom:1px solid rgba(143,138,125,.45);
    outline:none;
    color:var(--ink);
    font-family:Didot, "Bodoni MT", "Playfair Display", Georgia, serif;
    font-style:italic;
    font-size:clamp(14px, 1.5vw, 17px);
    line-height:1.5;
    text-align:center;
    padding:10px 4px;
    resize:none;
    min-height:44px;
    max-height:150px;
    overflow-y:auto;
    transition:border-color .4s ease, opacity .4s ease;
    caret-color:var(--ink);
  }
  .ask textarea::placeholder{ color:rgba(143,138,125,.75); }
  .ask textarea:focus{ border-bottom-color:rgba(233,227,213,.8); }
  .ask textarea::-webkit-scrollbar{ width:4px; }
  .ask textarea::-webkit-scrollbar-thumb{
    background:rgba(143,138,125,.4); border-radius:2px; }
  .ask button{
    background:transparent;
    border:none;
    color:var(--dim);
    font-size:10px;
    letter-spacing:.28em;
    text-transform:uppercase;
    cursor:pointer;
    padding:10px 2px;
    transition:color .3s ease, opacity .4s ease;
    font-family:inherit;
  }
  .ask button:hover{color:var(--ink);}
  .ask.busy input, .ask.busy button{
    opacity:.35;
    pointer-events:none;
  }

  @media (max-width:640px){
    .meta{display:none;}
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div class="copy">
  <div class="eyebrow">sala de criação — dez mentes de pontos</div>
  <h1>feita de pontos</h1>
  <div class="arcs" id="arcs">
    <button data-a="maga" class="on">a alquimista</button>
    <button data-a="vidente">a semióloga</button>
    <button data-a="sabio">o estrategista</button>
    <button data-a="heroina">a provocadora</button>
    <button data-a="amante">o poeta</button>
    <button data-a="inocente">o brincante</button>
    <button data-a="explorador">o explorador</button>
    <button data-a="comum">o cético</button>
    <button data-a="diretora">diretora de criação</button>
    <button data-a="cerebro">o cérebro</button>
  </div>
</div>

<div class="meta">
  estado — <b id="estado">esperando</b><br>
  cérebro — <b id="brainInfo">—</b><br>
  arquétipo — <b id="archInfo">a maga</b><br>
  <b id="dotCount">—</b> pontos
</div>

<div class="bottomfade"></div>

<div class="thinking" id="thinking">
  <div class="tname" id="tName"></div>
  <div class="tphase" id="tPhase"></div>
  <div class="tbar"><i></i></div>
</div>

<div class="answer prevbox" id="prevBox">
  <div class="qecho" id="prevQuem"></div>
  <div class="text" id="prevText"></div>
</div>

<div class="answer" id="answerBox">
  <div class="qecho" id="qEcho"></div>
  <div class="text" id="aText"></div>
  <div class="fontes" id="fontesEl"></div>
  <div class="retorno" id="retorno"></div>
  <div id="handoff">
    <div class="hotext" id="hoText"></div>
    <button class="hobtn" id="hoYes" type="button">deixar</button>
    <button class="hobtn" id="hoNo" type="button">agora não</button>
  </div>
  <button id="deepBtn" type="button">✦ sintetizar sessão</button>
  <button id="dossieBtn" type="button">✦ gerar dossiê</button>
  <button id="pdfBtn" type="button">salvar transcrição</button>
  <button id="endBtn" type="button">encerrar conversa</button>
</div>

<div class="ask" id="askBar">
  <textarea id="qInput" maxlength="4000" rows="3"
         placeholder="cole seu brief ou sua ideia bruta… (enter envia · shift+enter quebra linha)"
         autocomplete="off" spellcheck="false"></textarea>
  <button id="micBtn" type="button" style="display:none">falar</button>
  <button id="soundBtn" type="button">som off</button>
  <button id="voiceBtn" type="button">voz off</button>
  <button id="qBtn" type="button">trabalhar a ideia</button>
</div>

<script>
(() => {
  /* ---- cérebro: Gemini (com Google Search) quando a chave existir;
     sem chave, usa a ponte Claude do claude.ai ---- */
  const GEMINI_KEY = '__GEMINI_KEY__';
  const USE_GEMINI = !!GEMINI_KEY && GEMINI_KEY.indexOf('__') === -1;
  /* o modelo é descoberto em tempo real via ListModels,
     preferindo sempre o mais avançado disponível na conta */
  let GEMINI_MODEL = null;
  let geminiCandidates = [];
  const GEM_PREFS = ['gemini-3-pro','gemini-3.0-pro','gemini-3-flash','gemini-3.0-flash',
                     'gemini-2.5-pro','gemini-2.5-flash','gemini-2.0','gemini'];

  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* =========================================================
     A SALA DE CRIAÇÃO — arsenais de técnica por mente
  ========================================================= */
  const ARSENAL = {
    maga: 'Protocolo: 1) identifique o elemento que todos tratam como fixo neste brief; 2) aplique UMA operação de SCAMPER nele, nomeando a operação; 3) descreva a ideia resultante numa cena concreta de uma frase. Teste de qualidade: se a inversão servir para qualquer produto, está rasa — refaça presa a ESTE produto.',
    vidente: 'Protocolo: 1) nomeie 2 ou 3 códigos dominantes da categoria (visual, verbal ou de ocasião), citando exemplo real; 2) aponte o código mais rígido; 3) proponha a quebra específica para esta marca. Teste de qualidade: código sem exemplo nomeado não vale.',
    sabio: 'Protocolo: 1) escreva a verdade nua do produto em até dez palavras; 2) derive dela a single-minded proposition; 3) corte da conversa tudo que não a serve. Teste de qualidade: se a proposição couber em outra marca, aperte mais.',
    heroina: 'Protocolo: 1) nomeie o medo da categoria — o que ninguém tem coragem de fazer; 2) formule um How Might We que encare esse medo; 3) aponte qual parte da ideia atual é um darling a matar. Teste de qualidade: provocação sem consequência prática é pose.',
    amante: 'Protocolo: 1) nomeie a emoção exata (proibido: felicidade, conexão); 2) escreva a cena-mãe — pessoa, hora, lugar, gesto — em uma frase; 3) mostre onde a marca entra sem interromper a cena. Teste de qualidade: se a cena não render um frame de filme, refaça.',
    inocente: 'Protocolo: 1) faça a pergunta ingênua que ataca a premissa central do brief; 2) traga um random input — uma palavra distante sorteada por você — e force a conexão com o produto; 3) proponha um jogo: uma regra absurda que geraria ideias. Teste de qualidade: ingênuo não é vago — a pergunta deve doer de tão simples.',
    explorador: 'Protocolo: 1) escolha uma indústria distante que já resolveu um problema estruturalmente igual; 2) descreva o mecanismo dela (não a estética), citando caso real nomeado; 3) transponha o mecanismo para este brief em uma frase. Teste de qualidade: sem caso nomeado, não vale.',
    cerebro: 'Protocolo: 1) traga UMA evidência científica nomeada — estudo, pesquisador ou princípio da psicologia e neurociência do comportamento (Kahneman, Damásio, Ariely, Byron Sharp) — pertinente ao brief; 2) traduza: o que isso diz sobre como as pessoas vão SE SENTIR diante da ideia; 3) responda: por que isso importaria na vida real delas. Teste de qualidade: dado sem tradução emocional não vale; emoção sem evidência também não.',
    diretora: 'Protocolo: 1) traga UMA referência artística nomeada — pintura, artista, movimento, fotógrafo, campanha premiada ou direção de arte icônica — que conversa com este brief; 2) explique em uma frase o mecanismo visual dela (composição, paleta, luz, gesto); 3) transponha: como essa estética vira craft para ESTA marca. Teste de qualidade: referência sem nome e sem mecanismo não vale; proibido Da Vinci ou Van Gogh como muleta genérica.',
    comum: 'Protocolo: 1) descreva a terça-feira real do público deste brief — hora, lugar, pressa; 2) aponte a fricção concreta número um entre a ideia e essa terça; 3) diga o que faria a pessoa realmente parar. Teste de qualidade: citar o consumidor sem cena obriga a refazer.'
  };
  const ESTANTE = {
    maga: 'O Homem e Seus Símbolos (Jung); A Whack on the Side of the Head (Roger von Oech)',
    vidente: 'Mitologias (Roland Barthes); O Herói de Mil Faces (Joseph Campbell)',
    sabio: 'Good Strategy Bad Strategy (Richard Rumelt); Posicionamento (Al Ries e Jack Trout)',
    heroina: 'Predatory Thinking (Dave Trott); A Coragem de Criar (Rollo May)',
    amante: 'Fragmentos de um Discurso Amoroso (Barthes); Made to Stick (Chip e Dan Heath)',
    inocente: 'O Pensamento Lateral (Edward de Bono); Livro sobre Nada (Manoel de Barros)',
    explorador: 'Roube Como um Artista (Austin Kleon); A Field Guide to Getting Lost (Rebecca Solnit)',
    comum: 'A Sociedade do Cansaço (Byung-Chul Han); Tentativa de Esgotamento de um Local Parisiense (Perec)',
    diretora: 'Ways of Seeing (John Berger); os anuários do D&AD e de Cannes Lions',
    cerebro: 'Rápido e Devagar (Daniel Kahneman); O Erro de Descartes (António Damásio); How Brands Grow (Byron Sharp)'
  };
  const FALLBACKS = {
    maga: ['Pegue o elemento mais banal dessa ideia e inverta: o que acontece se ele virar o herói? O que aqui todo mundo trata como fixo?','Aplique um SCAMPER rápido: se você eliminasse a peça mais óbvia do projeto, o que sobra — e o que isso liberta?'],
    vidente: ['Toda categoria tem um uniforme. Descreva o anúncio-clichê do seu mercado: cores, tom, promessa. Agora: qual peça desse uniforme você rasga primeiro?','O que todas as marcas do seu setor dizem em coro? A sua chance mora exatamente no que ninguém está dizendo.'],
    sabio: ['Corte os adjetivos: o que o seu produto FAZ, em uma frase de sete palavras? Essa frase aguentaria virar a campanha inteira?','Cinco porquês: por que essa ideia importa? E por que isso importa? Desça até bater na rocha.'],
    heroina: ['Qual versão dessa ideia te dá um frio na barriga? É provavelmente ela. O que precisaria morrer para ela viver?','A categoria inteira tem medo de quê? Aí está o seu mapa. Que decisão esse projeto adia?'],
    amante: ['Esqueça o produto por um minuto: qual é a emoção exata do seu público às 15h de uma terça? Comece a ideia dali.','Me dê a cena: uma pessoa real, um momento real, onde a sua marca entra sem pedir licença. O que ela sente?'],
    inocente: ['Explica essa ideia como se eu tivesse sete anos. O que ficou de fora da explicação talvez não precisasse existir.','Pergunta boba de propósito: por que isso tem que ser do jeito que sempre foi?'],
    explorador: ['Como a Red Bull lançaria o seu produto? E uma marca de luxo? E um clube de futebol? Roube o mecanismo, não a estética.','Que categoria completamente diferente já resolveu um problema igual ao seu? Vá buscar lá.'],
    cerebro: ['Kahneman mostrou: decidimos pelo Sistema 1 e justificamos pelo 2. A sua ideia fala com qual dos dois primeiro? — Que emoção dispara antes do argumento?','Damásio provou que sem emoção não há decisão. Qual é o marcador somático da sua ideia — o que o corpo sente antes de a mente concordar?'],
    diretora: ['O Guinness Surfer de 1999 provou que craft É a ideia: cavalos na espuma, Leftfield no som. Qual imagem sua carrega a ideia sozinha, sem legenda? — Que referência visual você está evitando por parecer ambiciosa demais?','Barbara Kruger fez do texto sobre foto uma arma. Se a sua ideia tivesse UMA frase sobre UMA imagem, quais seriam? — O que você corta para a imagem respirar?'],
    comum: ['Por que alguém largaria o que está fazendo para olhar isso? Se a resposta demorar, a ideia ainda não está pronta.','Qual é a fricção real de usar isso numa terça qualquer? A campanha mora em resolver essa fricção, não em decorá-la.']
  };



  /* =========================================================
     MOTOR DO ROSTO
  ========================================================= */

    const GAMMA = 1.5;

    const ALFA = {
      num: '0123456789',
      let: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',

    };
    /* amostra um rosto: mesma contagem de pontos em todos,
       para que a metamorfose pareie ponto a ponto */
    function buildFace(imgEl, cfg){
      const src = document.createElement('canvas');
      src.width = SW; src.height = SH;
      const s = src.getContext('2d');
      s.drawImage(imgEl, 0, 0, SW, SH);
      const data = s.getImageData(0, 0, SW, SH).data;
      const CA = cfg.A;
      const AW = cfg.aw;
      function lumAt(x, y){
        const i = ((y | 0) * SW + (x | 0)) * 4;
        return (data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114) / 255;
      }
      const out = [];
      let attempts = 0;
      while (out.length < FACE_N && attempts < FACE_N * 80){
        attempts++;
        let x = Math.random() * SW;
        let y = Math.random() * SH;
        const lum0 = lumAt(x, y);
        if (lum0 < 0.085) continue;
        /* curva de tom: o piso afina os meios-tons (pele) e
           preserva os brilhos (olhos, cabelo, lábios) */
        const lum = (lum0 - cfg.floor) / (1 - cfg.floor);
        if (lum <= 0) continue;
        const gEL = gauss(x, y, CA.eyeL.x, CA.eyeL.y, cfg.sigma, cfg.sigma * 0.72);
        const gER = gauss(x, y, CA.eyeR.x, CA.eyeR.y, cfg.sigma, cfg.sigma * 0.72);
        const boost = Math.min(1, gEL + gER);
        /* feather: a densidade sobe suavemente a partir das bordas,
           eliminando o corte reto da moldura */
        const edge = Math.min(x, y, SW - x, SH - y);
        const feather = Math.min(1, Math.max(0, edge) / 48);
        const dens = Math.min(1, lum * (1 + cfg.boost * boost)) * feather;
        if (Math.random() >= Math.pow(dens, GAMMA)) continue;
        if (boost > 0.02){
          x += (x - CA.eyeL.x) * cfg.mag * gEL;
          y += (y - CA.eyeL.y) * cfg.mag * gEL;
          x += (x - CA.eyeR.x) * cfg.mag * gER;
          y += (y - CA.eyeR.y) * cfg.mag * gER;
        }
        const wMoV = gauss(x, y, CA.mouthC.x, CA.mouthC.y, 46 * AW, 26 * AW);
        const lipLow = Math.max(0, Math.min(1, (y - CA.mouthC.y) / 16));
        /* regiões cerebrais (só usadas pelo cérebro):
           límbico central-baixo, pré-frontal esq/dir, posterior direito */
        const rLimb = gauss(x, y, 280, 480, 95, 80);
        const rPfL  = gauss(x, y, 195, 250, 90, 85);
        const rPfR  = gauss(x, y, 365, 250, 90, 85);
        const rPost = gauss(x, y, 380, 430, 105, 95);
        /* glifos: só onde há luz (áreas claras têm espaço para a forma);
           as sombras densas continuam sendo pontos */
        let ch = null;
        if (cfg.glifo && lum > 0.42 && Math.random() < (cfg.glifoFrac || 0.5)){
          const alfabeto = cfg.glifoSet || ALFA[cfg.glifo] || ALFA.mix;
          ch = alfabeto[(Math.random() * alfabeto.length) | 0];
        }
        out.push({
          x, y, ch,
          r: (0.5 + lum * 0.8 + Math.random() * 0.28) * (1 - 0.28 * boost) * cfg.dotR,
          a: Math.min(1, 0.32 + lum * 0.62 + 0.18 * boost),
          ph1: Math.random() * Math.PI * 2,
          ph2: Math.random() * Math.PI * 2,
          ph3: Math.random() * Math.PI * 2,
          f1: 0.35 + Math.random() * 0.55,
          f2: 0.30 + Math.random() * 0.50,
          f3: 0.60 + Math.random() * 0.90,
          amp: (0.32 + Math.random() * 0.5) * (1 - 0.45 * boost),
          ox: 0, oy: 0,
          heat: 0,
          i0x: Math.random(),
          i0y: Math.random(),
          d0: Math.random() * 0.9,
          wIr:  gauss(x, y, CA.eyeL.x, CA.eyeL.y, 17 * AW, 14 * AW) +
                gauss(x, y, CA.eyeR.x, CA.eyeR.y, 17 * AW, 14 * AW),
          wEye: Math.min(1,
                gauss(x, y, CA.eyeL.x, CA.eyeL.y, 34 * AW, 20 * AW) +
                gauss(x, y, CA.eyeR.x, CA.eyeR.y, 34 * AW, 20 * AW)),
          wBr:  gauss(x, y, CA.browL.x, CA.browL.y, 40 * AW, 11 * AW) +
                gauss(x, y, CA.browR.x, CA.browR.y, 40 * AW, 11 * AW),
          wMcL: gauss(x, y, CA.mouthL.x, CA.mouthL.y, 17 * AW, 15 * AW),
          wMcR: gauss(x, y, CA.mouthR.x, CA.mouthR.y, 17 * AW, 15 * AW),
          wChL: gauss(x, y, CA.cheekL.x, CA.cheekL.y, 28 * AW, 36 * AW),
          wChR: gauss(x, y, CA.cheekR.x, CA.cheekR.y, 28 * AW, 36 * AW),
          wMo:  wMoV,
          wMoLow: wMoV * lipLow,
          wMoUp:  wMoV * (1 - lipLow),
          wJaw: gauss(x, y, CA.mouthC.x, CA.mouthC.y + 70, 55 * AW, 42 * AW),
          wTurn: gauss(x, y, CA.faceC.x, CA.faceC.y, 88, 175),
          wHead: gauss(x, y, CA.faceC.x, CA.faceC.y + 20, 215, 290),
          rLimb, rPfL, rPfR, rPost, hx: x
        });
      }
      /* halo: gradiente de pontos para fora das bordas — a luz
         da borda decide a força do halo em cada trecho */
      const HM = 150, HSIG = 55;
      const haloGoal = out.length + HALO_N;
      let ha = 0;
      function haloDot(x, y, a, r){
        return {
          x, y, r, a,
          ph1: Math.random() * Math.PI * 2,
          ph2: Math.random() * Math.PI * 2,
          ph3: Math.random() * Math.PI * 2,
          f1: 0.35 + Math.random() * 0.55,
          f2: 0.30 + Math.random() * 0.50,
          f3: 0.60 + Math.random() * 0.90,
          amp: 0.4 + Math.random() * 0.5,
          ox: 0, oy: 0, heat: 0,
          i0x: Math.random(), i0y: Math.random(),
          d0: Math.random() * 0.9,
          wIr: 0, wEye: 0, wBr: 0, wMcL: 0, wMcR: 0,
          wMo: 0, wMoLow: 0, wMoUp: 0, wJaw: 0,
          wChL: 0, wChR: 0, wTurn: 0,
          wHead: Math.max(0, 0.25 - Math.random() * 0.15)
        };
      }
      while (out.length < haloGoal && ha < HALO_N * 90){
        ha++;
        const x = -HM + Math.random() * (SW + 2 * HM);
        const y = -HM + Math.random() * (SH + 2 * HM);
        const dxE = x < 0 ? -x : (x > SW ? x - SW : 0);
        const dyE = y < 0 ? -y : (y > SH ? y - SH : 0);
        const d = Math.hypot(dxE, dyE);
        if (d <= 0.5) continue;
        const lumE = lumAt(Math.min(SW - 1, Math.max(0, x)),
                           Math.min(SH - 1, Math.max(0, y)));
        const pr = lumE * Math.exp(-d / HSIG);
        if (Math.random() >= pr) continue;
        const hd = haloDot(x, y,
          Math.min(0.55, 0.1 + pr * 0.5),
          (0.45 + Math.random() * 0.55) * cfg.dotR);
        hd.hx = x;
        out.push(hd);
      }
      /* completa a contagem com poeira remota tênue (paridade da metamorfose) */
      while (out.length < haloGoal){
        const ang = Math.random() * 6.2832;
        out.push(haloDot(
          SW / 2 + Math.cos(ang) * (SW * 0.62 + Math.random() * HM),
          SH / 2 + Math.sin(ang) * (SH * 0.56 + Math.random() * HM),
          0.05, 0.4));
      }
      return out;
    }

    function pickIdleExpression(t){
      let e;
      do { e = IDLE_EXPR[(Math.random() * IDLE_EXPR.length) | 0]; } while (e === target);

    /* ---------- piscadas ---------- */
    let blinkStart = 1.6;
    let doubleBlink = false;
    const BLINK_DUR = 0.16;
    function blinkValue(t){
      if (reduceMotion) return 0;
      const dt = t - blinkStart;
      if (dt < 0) return 0;
      const total = BLINK_DUR * 2;
      if (dt < total){
        return dt < BLINK_DUR ? dt / BLINK_DUR : 1 - (dt - BLINK_DUR) / BLINK_DUR;
      }
      if (doubleBlink){
        doubleBlink = false;
        blinkStart = t + 0.18;
      } else {
        doubleBlink = Math.random() < 0.22;
        blinkStart = t + (2.2 + Math.random() * 4.2) * ARQ.blinkMul;
      }
      return 0;

    /* =========================================================

    const convo = { on: false, history: [], ans: null, card: null, turns: 0 };

reva o princípio e diga que o número precisa ser verificado. Inventar uma fonte é o pior erro possível nesta sala. Responda APENAS com JSON válido, sem markdown: {"humor":"sereno|provocador|gentil|enigma","resposta":"...","proximo":"maga|vidente|sabio|heroina|amante|inocente|explorador|comum|diretora|cerebro — outra mente, diferente de quem respondeu, que teria algo a acrescentar ou contestar agora","gancho":"em até 12 palavras, o que essa mente quer dizer"}' +

    const PLACEHOLDER_ORACULO = 'cole seu brief ou sua ideia bruta…';

    const pdfBtn = document.getElementById('pdfBtn');
    function escHtml(s){
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')

    }
    function buildSessionDoc(){
      const quando = new Date().toLocaleString('pt-BR',

    function imprime(html, nomeArquivo){

    /* seletor de arquétipos */
    document.getElementById('arcs').addEventListener('click', e => {

    function syncPills(){

        x.classList.toggle('on', x.dataset.a === curKey));

    /* indicador do cérebro em uso e diagnóstico de falhas */
    const brainInfo = document.getElementById('brainInfo');
    brainInfo.textContent = USE_GEMINI ? 'gemini + busca' : 'claude';
    function setBrain(txt, isErr){
      brainInfo.textContent = txt;
      brainInfo.style.color = isErr ? 'rgb(255,140,120)' : '';
    }
    function brainErr(e, status, apiMsg){
      const base = USE_GEMINI ? 'gemini' : 'claude';
      if (status === 400) return base + ' 400: requisição inválida';
      if (status === 401 || status === 403) return base + ' ' + status + ': chave inválida ou restrita';
      if (status === 404) return base + ' 404: modelo não encontrado';
      if (status === 429) return base + ' 429: cota excedida';
      if (status) return base + ' ' + status + (apiMsg ? ': ' + apiMsg.slice(0, 60) : '');
      if (e && e.name === 'AbortError') return base + ': tempo esgotado';
      return base + ': falha de rede';
    }

    /* descobre qual é o gemini mais avançado que a chave enxerga */
    function prefScore(n){
      for (let i = 0; i < GEM_PREFS.length; i++)
        if (n.indexOf(GEM_PREFS[i]) === 0) return i;
      return 99;
    }
    let gemPick = null;
    function ensureGeminiModel(){
      if (GEMINI_MODEL) return Promise.resolve(true);
      if (gemPick) return gemPick;
      gemPick = (async () => {
        try{
          const r = await fetch(
            'https://generativelanguage.googleapis.com/v1beta/models?pageSize=200&key=' +
            GEMINI_KEY);
          const data = await r.json().catch(() => null);
          if (!r.ok){
            setBrain(brainErr(null, r.status,
              (data && data.error && data.error.message) || ''), true);
            gemPick = null;
            return false;
          }
          const bad = /embedding|tts|image|veo|imagen|audio|live|aqa|robotics/i;
          const ms = (data.models || [])
            .filter(m => (m.supportedGenerationMethods || []).indexOf('generateContent') !== -1)
            .map(m => m.name.replace('models/', ''))
            .filter(n => !bad.test(n));
          ms.sort((a, b) => prefScore(a) - prefScore(b) || a.length - b.length);
          geminiCandidates = ms;
          GEMINI_MODEL = ms[0] || null;
          if (!GEMINI_MODEL){
            setBrain('gemini: nenhum modelo disponível', true);
            return false;
          }
          console.log('[feita de pontos] modelos gemini da conta:', ms.slice(0, 10));
          setBrain(GEMINI_MODEL + ' + busca');
          return true;
        }catch(e){
          console.warn('[feita de pontos] falha ao listar modelos', e);
          setBrain('gemini: falha ao listar modelos', true);
          gemPick = null;
          return false;
        }
      })();
      return gemPick;
    }
    if (USE_GEMINI){
      setBrain('gemini: escolhendo modelo…');
      ensureGeminiModel();
    }

    /* contexto vivo da sessão: cartão do brief + fase atual */
    let fatosSessao = [];
    let bibliografia = [];  /* {titulo, uri} — todas as fontes reais da sessão */
    function sessionContext(){
      let s = '';
      if (convo.card) s += 'BRIEF DA SESSÃO — ' + convo.card + '. ';
      if (fatosSessao.length)
        s += 'FONTES JÁ CONSULTADAS NESTA SESSÃO (pode citar; nada além disto sem nova busca): ' +
             fatosSessao.slice(-6).join(' | ') + '. ';
      const ph = convo.turns < 2
        ? 'mergulho: responder com posição clara o que o criativo perguntou e nomear a tensão real'
        : convo.turns < 5
          ? 'territórios: abrir caminhos criativos distintos e concretos, com exemplos de execução'
          : 'afiar: escolher o melhor caminho, apontar o que cortar e definir o próximo passo';
      s += 'FASE DA SESSÃO: ' + ph + '. ';
      s += 'ÂNCORA — NÃO SAIA DO OBJETO: toda contribuição deve ser sobre o brief acima, ' +
           'e não sobre um cliente, campanha ou consumidor imaginário. É PROIBIDO inventar ' +
           'um público ou uma cena de marca que não estejam no brief. Se a conversa começar ' +
           'a derivar para outro assunto, traga-a de volta ao objeto do brief na primeira frase. ';
      return s;
    }

    /* ---- cliente unificado: Gemini (com Google Search) ou Claude ---- */
    let llmFontes = [];
    async function llm(system, messages, retry, cheap){
      if (!retry) llmFontes = [];
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 35000);
      try{
        let raw = '', status = 0, apiMsg = '';
        if (USE_GEMINI){
          const ok = await ensureGeminiModel();
          if (!ok){ clearTimeout(timer); return null; }
          /* tarefas burocráticas usam um flash: poupa a cota do modelo nobre */
          const model = cheap
            ? (geminiCandidates.find(n => n.indexOf('flash') !== -1) || GEMINI_MODEL)
            : GEMINI_MODEL;
          const r = await fetch(
            'https://generativelanguage.googleapis.com/v1beta/models/' +
            model + ':generateContent?key=' + GEMINI_KEY,
            { method: 'POST', headers: { 'Content-Type': 'application/json' },
              signal: ctrl.signal,
              body: JSON.stringify({
                systemInstruction: { parts: [{ text: system }] },
                contents: messages.map(m => ({
                  role: m.role === 'assistant' ? 'model' : 'user',
                  parts: [{ text: m.content }]
                })),
                tools: [{ google_search: {} }],
                generationConfig: { temperature: 0.9 }
              }) });
          status = r.status;
          const data = await r.json().catch(() => null);
          if (!r.ok){
            apiMsg = (data && data.error && data.error.message) || '';
            console.warn('[feita de pontos] erro gemini', status, apiMsg, data);
            if ((status === 404 || status === 429) &&
                geminiCandidates.length > 1 && (retry || 0) < 2){
              const antigo = GEMINI_MODEL;
              geminiCandidates.shift();
              GEMINI_MODEL = geminiCandidates[0];
              console.warn('[feita de pontos]', status, 'em', antigo,
                '— descendo para', GEMINI_MODEL);
              setBrain(GEMINI_MODEL + ' + busca');
              clearTimeout(timer);
              return llm(system, messages, (retry || 0) + 1, cheap);
            }
            setBrain(brainErr(null, status, apiMsg), true);
            clearTimeout(timer);
            return null;
          }
          const cand = (data && data.candidates || [])[0];
          raw = ((cand && cand.content && cand.content.parts) || [])
            .map(p => p.text || '').join('\n');
          const gm = cand && cand.groundingMetadata;
          if (gm && gm.groundingChunks){
            llmFontes = gm.groundingChunks
              .map(c => c.web ? { titulo: c.web.title || c.web.uri, uri: c.web.uri } : null)
              .filter(Boolean).slice(0, 3);
            llmFontes.forEach(f => {
              if (fatosSessao.indexOf(f.titulo) === -1) fatosSessao.push(f.titulo);
              if (!bibliografia.some(b => b.uri === f.uri)) bibliografia.push(f);
            });
          }
          if (!raw){
            console.warn('[feita de pontos] gemini respondeu vazio', data);
            setBrain('gemini: resposta vazia', true);
            clearTimeout(timer);
            return null;
          }
          if (!cheap) setBrain(GEMINI_MODEL + ' ✓');
        } else {
          const r = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            signal: ctrl.signal,
            body: JSON.stringify({
              model: 'claude-sonnet-4-6', max_tokens: 1000,
              system, messages
            })
          });
          status = r.status;
          const data = await r.json().catch(() => null);
          if (!r.ok){
            apiMsg = (data && data.error && data.error.message) || '';
            console.warn('[feita de pontos] erro claude', status, apiMsg, data);
            setBrain(brainErr(null, status, apiMsg), true);
            clearTimeout(timer);
            return null;
          }
          raw = (data && data.content || []).filter(b => b.type === 'text')
            .map(b => b.text).join('\n');
          setBrain('claude ✓');
        }
        clearTimeout(timer);
        return raw;
      }catch(e){
        clearTimeout(timer);
        console.warn('[feita de pontos] falha na chamada', e);
        setBrain(brainErr(e, 0, ''), true);
        return null;
      }
    }
    function limpa(s){
      return String(s)
        .replace(/^\s*\[[^\]]{1,40}\]\s*/g, '')   /* etiqueta [nome] vazada */
        .replace(/\*+/g, '').replace(/[#_`~]+/g, ' ')
        .replace(/\s{2,}/g, ' ').trim();
    }
    function outraMente(exceto){
      const ks = Object.keys(ARCH).filter(k => k !== exceto);
      return ks[(Math.random() * ks.length) | 0];
    }
    function parseAns(raw, routing){
      if (!raw) return null;
      const clean = raw.replace(/```json|```/g, '').trim();
      try{
        const p = JSON.parse(clean);
        const humor = ['sereno','provocador','gentil','enigma'].includes(p.humor)
          ? p.humor : 'gentil';
        const quem = (routing && ARCH[p.quem]) ? p.quem : curKey;
        const prox = (ARCH[p.proximo] && p.proximo !== quem)
          ? p.proximo : outraMente(quem);
        return { t: limpa(p.resposta), m: humor, quem, prox,
                 gancho: p.gancho ? limpa(p.gancho).slice(0, 90) : '' };
      }catch(e){
        const t = limpa(clean);
        if (t.length < 4) return null;
        return { t: t.slice(0, 700), m: 'gentil', quem: curKey,
                 prox: outraMente(curKey), gancho: '' };
      }
    }

    /* chamada da sessão: roteada (o elenco decide quem trabalha) ou forçada */
    async function callConvo(routing){
      let system;
      if (routing){
        system = 'Vocês são uma sala de criação: um elenco de mentes feitas de pontos de luz que ajudam profissionais criativos a desenvolver ideias e briefs reais. Elenco: ' +
          CAST_DESC + ' A mente em cena agora é ' + ARQ.nome +
          '. Decida quem responde à última fala: em geral, quem está em cena; passe a palavra apenas se outra mente tiver a técnica claramente mais valiosa para este momento da ideia. Escreva na voz de quem responde, aplicando o arsenal dela ao caso concreto. ' +
          CONVO_BASE.replace('{"humor"', '{"quem":"maga|vidente|sabio|heroina|amante|inocente|explorador|comum|diretora|cerebro","humor"');
      } else {
        system = ARQ.persona + ' Estante de referência: ' + (ESTANTE[curKey] || '') +
          '. ' + CONVO_BASE;
      }
      let raw = await llm(sessionContext() + system, convo.history);
      let ans = parseAns(raw, routing);
      if (!ans){
        /* uma segunda chance antes de desistir */
        await new Promise(r => setTimeout(r, 900));
        raw = await llm(sessionContext() + system, convo.history);
        ans = parseAns(raw, routing);
      }
      if (ans){ ans.fontes = llmFontes.slice(); return ans; }
      /* último recurso: uma fala curta, mas ainda sobre ESTE brief */
      const bruto = await llm(
        sessionContext() + ARQ.persona +
        ' Responda ao criativo em duas frases diretas sobre o brief acima, na sua especialidade, e termine com uma pergunta curta. Português do Brasil, sem asteriscos, sem markdown, no máximo 45 palavras. Escreva apenas o texto, sem JSON.',
        convo.history);
      if (bruto && limpa(bruto).length > 12){
        return { t: limpa(bruto).slice(0, 400), m: 'gentil', quem: curKey,
                 prox: outraMente(curKey), gancho: '', local: true };
      }
      const fb = FALLBACKS[curKey];
      return { t: fb[(Math.random() * fb.length) | 0], m: 'gentil', quem: curKey,
               prox: outraMente(curKey), gancho: '', local: true };
    }

    async function sendReply(text){
      if (oracle.state === 'convo') return;
      hideHandoff();
      convo.history.push({ role: 'user', content: text });
      convo.turns++;

      qInput.blur();
      convo.ans = await callConvo(true);
    }

    const fontesEl = document.getElementById('fontesEl');
    function escA(s){ return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
    function mostraFontes(fontes){
      if (!fontes || !fontes.length){ fontesEl.innerHTML = ''; return ''; }

    /* o cartão da coxia: quem quer entrar em seguida, e com que gancho */
    function showNextCard(prox, gancho){
      pendingHO = { quem: prox, inter: true };
      hoText.textContent = '✦ ' + ARCH[prox].nome + ' quer participar' +
        (gancho ? ' — “' + gancho + '”' : '');

    document.getElementById('hoYes').addEventListener('click', () => {
      if (!pendingHO) return;
      const ho = pendingHO;
      hideHandoff();
      if (ho.opener){
        setArch(ho.quem, false);
        syncPills();
        setTimeout(() => beginConvo(true), 1200);

      }
      if (ho.resume){
        const s = ho.resume;
        convo.on = true;
        convo.history = s.historia;
        convo.card = s.card || null;
        convo.turns = s.turns || 0;
        bibliografia = s.biblio || [];
        fatosSessao = s.fatos || [];
        oracle.lastQ = s.brief || null;
        if (s.quem && ARCH[s.quem] && s.quem !== curKey){
          setArch(s.quem, false);
          syncPills();
        }
        qInput.placeholder = PLACEHOLDER_CONVO;
        qBtn.textContent = 'responder';
        endBtn.classList.add('on');
        /* reexibe a última fala do elenco */
        let ultima = null, nomeU = ARQ.nome;
        for (let i = s.historia.length - 1; i >= 0; i--){
          const m2 = s.historia[i];
          if (m2.role === 'assistant'){
            const mt = m2.content.match(/^\[([^\]]+)\]\s*([\s\S]*)$/);
            nomeU = mt ? mt[1] : nomeU;
            ultima = mt ? mt[2] : m2.content;
            break;
          }
        }
        if (ultima){
          revealLine(performance.now() / 1000, ultima, 'sereno',
            nomeU + ' · sessão retomada');
        }
        return;
      }
      if (ho.inter){
        const anterior = ARQ.nome;
        setArch(ho.quem, false);
        syncPills();
        convo.history.push({ role: 'user', content:
          '[direção da sessão] ' + ARCH[ho.quem].nome +
          ', responda diretamente à última fala de ' + anterior +
          ': concorde, construa ou divirja com firmeza — e feche com uma pergunta curta ao criativo.' });
        oracle.state = 'convo';
        convo.ans = null;
        oracle.until = performance.now() / 1000 + 1.3;
        askBar.classList.add('busy');
        setEstado(ARCH[ho.quem].nome + ' entra na conversa');
        pensa(ARCH[ho.quem].nome, FASES);
        oracle.agitTarget = 0.5;
        (async () => { convo.ans = await callConvo(false); })();

    });

        return;

    });

    /* revela uma fala dela (usada na conversa) */
    function revealLine(t, text, humor, echoLabel){
      oracle.state = 'revealing';
      oracle.agitTarget = 0;
      oracle.follow = null;
      oracle.resumeAt = t + 3600; /* na conversa, ela não volta ao idle sozinha */

      target = MOOD_EXPR[humor];
      nextChange = Infinity;
      setEstado(target.n);

      paraPensa();
      acendeArea(humor);

    /* ------- a voz dela (opcional) ------- */
    let voiceOn = false;
    let ptVoice = null;
    /* distribui as vozes pt disponíveis pelo elenco, por gênero */
    function assignVoices(){
      try{
        const todas = speechSynthesis.getVoices()
          .filter(v => (v.lang || '').toLowerCase().indexOf('pt') === 0);
        const br = todas.filter(v =>
          (v.lang || '').toLowerCase().replace('_', '-') === 'pt-br');
        /* só recorre a vozes de Portugal se não houver NENHUMA brasileira */
        const vs = br.length ? br : todas;
        ptVoice = vs[0] || null;
        const femRe = /maria|luciana|joana|francisca|fernanda|camila|vitoria|leticia|raquel|ines|yara|female|feminin/i;
        const masRe = /daniel|felipe|ricardo|thiago|antonio|duarte|joaquim|donato|male|masculin/i;
        const fem = vs.filter(v => femRe.test(v.name));
        const mas = vs.filter(v => masRe.test(v.name));
        const resto = vs.filter(v => fem.indexOf(v) === -1 && mas.indexOf(v) === -1);
        const idx = { f: 0, m: 0 };
        for (const k in ARCH){
          const g = ARCH[k].g;
          let pool = g === 'f' ? fem : mas;
          if (!pool.length) pool = resto.length ? resto : vs;
          if (pool.length){
            ARCH[k].voice = pool[idx[g] % pool.length];
            idx[g]++;
          }
        }
      }catch(e){}
    }
    if ('speechSynthesis' in window){
      assignVoices();
      speechSynthesis.onvoiceschanged = assignVoices;

    function speak(text){
      if (!voiceOn || !('speechSynthesis' in window)) return 0;
      try{
        /* a voz pula parênteses e colchetes: nomes, anos e fontes
           ficam na tela, mas não são narrados */
        const falavel = String(text)
          .replace(/\[[^\]]*\]/g, ' ')
          .replace(/\([^)]*\)/g, ' ')
          .replace(/\s{2,}/g, ' ')
          .trim();
        if (!falavel) return 0;
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(falavel);
        u.lang = 'pt-BR';
        if (ARQ.voice) u.voice = ARQ.voice;
        else if (ptVoice) u.voice = ptVoice;
        u.rate = ARQ.rate;
        u.pitch = ARQ.pitch;
        speechSynthesis.speak(u);
        return falavel.split(' ').length * 0.34 + 0.6;
      }catch(e){ return 0; }

    /* ------- o som do toque (Web Audio, generativo) ------- */
    let audioOn = false, actx = null, master = null, padGain = null, padFilter = null;
    function initAudio(){
      if (actx) return;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      actx = new AC();
      master = actx.createGain();
      master.gain.value = 0.6;
      master.connect(actx.destination);
      /* eco curto: dá espaço às notas */
      const dly = actx.createDelay(1);
      dly.delayTime.value = 0.32;
      const fb = actx.createGain();
      fb.gain.value = 0.28;
      const wet = actx.createGain();
      wet.gain.value = 0.3;
      master.connect(dly);
      dly.connect(fb); fb.connect(dly);
      dly.connect(wet); wet.connect(actx.destination);
      /* sopro: ruído por filtro passa-banda, ganho segue o toque */
      const len = actx.sampleRate * 2;
      const buf = actx.createBuffer(1, len, actx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const noise = actx.createBufferSource();
      noise.buffer = buf; noise.loop = true;
      padFilter = actx.createBiquadFilter();
      padFilter.type = 'bandpass';
      padFilter.Q.value = 1.3;
      padFilter.frequency.value = 800;
      padGain = actx.createGain();
      padGain.gain.value = 0;
      noise.connect(padFilter);
      padFilter.connect(padGain);
      padGain.connect(master);
      noise.start();
    }
    function note(freq, vel, pan){
      if (!actx) return;
      const t0 = actx.currentTime;
      const S = SOM[curKey] || SOM._;
      const dur = S.dur;
      const o = actx.createOscillator();
      o.type = ARQ.wave;
      vel = vel * (ARQ.wave === 'sawtooth' ? 0.45 : 1) * (S.vel || 1);
      o.frequency.value = freq * (1 + (Math.random() - 0.5) * 0.004);
      if (S.vib){
        const lfo = actx.createOscillator();
        const lg = actx.createGain();
        lfo.frequency.value = 5.2;
        lg.gain.value = freq * 0.008;
        lfo.connect(lg); lg.connect(o.frequency);
        lfo.start(t0); lfo.stop(t0 + dur + 0.1);
      }
      const g = actx.createGain();
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(vel, t0 + (S.atk || 0.012));
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g);
      if (actx.createStereoPanner){
        const p = actx.createStereoPanner();
        p.pan.value = Math.max(-1, Math.min(1, pan));
        g.connect(p); p.connect(master);
      } else {
        g.connect(master);
      }
      o.start(t0);
      o.stop(t0 + dur + 0.1);
      /* quinta ou terça ocasional: vira acorde */
      if (S.chord && Math.random() < S.chord){
        const o2 = actx.createOscillator();
        o2.type = ARQ.wave;
        o2.frequency.value = freq * (Math.random() < 0.5 ? 1.5 : 1.2599);
        const g2 = actx.createGain();
        g2.gain.setValueAtTime(0, t0);
        g2.gain.linearRampToValueAtTime(vel * 0.45, t0 + 0.02);
        g2.gain.exponentialRampToValueAtTime(0.0001, t0 + dur * 0.9);
        o2.connect(g2); g2.connect(master);
        o2.start(t0 + 0.015);
        o2.stop(t0 + dur + 0.1);
      }
    }
    /* assinatura sonora de cada mente */
    const SOM = {
      _:          { dur: 1.1, atk: 0.012, chord: 0.15 },

      inocente:   { dur: 0.55, atk: 0.005, chord: 0.25 },

    const soundBtn = document.getElementById('soundBtn');

    /* ------- modo profundo: ela interpreta o hexagrama para o dilema ------- */
    const DEEP_SYSTEM = 'Sintetize a sessão de criação até aqui: nomeie de 2 a 3 territórios criativos que emergiram (com títulos curtos e memoráveis), a tensão central da ideia, e UM próximo passo concreto. Máximo de 110 palavras, em português do Brasil, prosa direta, literal e sem aforismos herméticos; responda também, com posição clara, a pergunta que o criativo fez no início; PROIBIDO asteriscos, markdown e listas. Termine com uma pergunta de decisão. Responda APENAS com JSON válido, sem markdown: {"humor":"sereno|provocador|gentil|enigma","resposta":"..."}';

    async function askDeep(){
      if (!convo.on) return;
      if (oracle.state === 'deep' || oracle.state === 'convo') return;
      hideHandoff();
      /* o estrategista assume a síntese */
      if (curKey !== 'sabio'){ setArch('sabio', false); syncPills(); }
      oracle.state = 'deep';
      oracle.deepAns = null;

      askBar.classList.add('busy');

          convo.history[convo.history.length - 1].content.indexOf('[pedido de síntese]') !== 0){
        convo.history.push({ role: 'user',
          content: '[pedido de síntese] Sintetize a sessão: territórios, tensão central e próximo passo.' });
      }
      const raw = await llm(sessionContext() + ARQ.persona + ' ' + DEEP_SYSTEM, convo.history);
      const ans = parseAns(raw, false);
      if (ans) ans.fontes = llmFontes.slice();
      oracle.deepAns = ans
        ? { ans }
        : { ans: { t: 'A síntese pede as camadas profundas — e elas estão em silêncio agora. Releia a sessão: os territórios já estão nela.', m: 'sereno' } };
    }
    deepBtn.addEventListener('click', askDeep);

    function reveal(t, q, ans, isDeep, cast){
      oracle.state = 'revealing';
      oracle.agitTarget = 0;

      target = MOOD_EXPR[ans.m];
      nextChange = Infinity;
      setEstado(target.n);

      if (isDeep){
        qEcho.textContent = '✦ ' + (q.length > 80 ? q.slice(0, 80) + '…' : q) + ' ✦';
      } else {
        qEcho.textContent = '— ' + (q.length > 80 ? q.slice(0, 80) + '…' : q) + ' —';
      }
      qEcho.classList.add('on');
      answerBox.classList.add('on');

      const words = ans.t.split(' ');
      /* ela "fala" enquanto as palavras surgem (com voz, se ativada) */
      const spokenDur = speak(ans.t);
      talkStart = t;
      talkUntil = t + (spokenDur || Math.min(6.5, 1.0 + words.length * 0.075 + 0.8));
      aText.innerHTML = '';
      const spans = words.map((w, i) => {
        const sp = document.createElement('span');
        sp.textContent = w + ' ';
        sp.style.transitionDelay = Math.min(i * 75, 3200) + 'ms';
        aText.appendChild(sp);
        return sp;
      });
      requestAnimationFrame(() => requestAnimationFrame(() => {
        spans.forEach(sp => sp.classList.add('on'));
      }));

      /* depois da reflexão, a pergunta devolvida */
      if (!isDeep && cast && cast.pergunta){
        oracle.follow = {
          text: '— ' + cast.pergunta,
          at: t + Math.min(3.6, 1.0 + words.length * 0.075) + 2.2
        };
        oracle.resumeAt = oracle.follow.at + 9;
      } else {
        oracle.follow = null;
        oracle.resumeAt = t + 11;
      }

      /* o convite para mergulhar só aparece na leitura do acaso */
      if (!isDeep) deepBtn.classList.add('on');

      qInput.value = '';
      askBar.classList.remove('busy');
    }

    /* ---------- renderização ---------- */
    let W, H, DPR, scale, offX, offY;
    function resize(){
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W * DPR; canvas.height = H * DPR;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      scale = Math.min(H / SH, W / SW * 1.35) * 0.98;
      offX = (W - SW * scale) / 2;
      offY = (H - SH * scale) / 2;
    }
    resize();
    window.addEventListener('resize', resize);

    const mouse = { x: -9999, y: -9999, active: false };
    const RADIUS = 95, FORCE = 34;
    window.addEventListener('pointermove', e => {
      mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
    });
    window.addEventListener('pointerleave', () => { mouse.active = false; });

    /* silêncio: quando foi a última vez que você se mexeu por aqui */
    let lastInteraction = performance.now() / 1000 + 10;
    const bump = () => { lastInteraction = performance.now() / 1000; };
    window.addEventListener('pointermove', bump);
    window.addEventListener('pointerdown', bump);
    window.addEventListener('keydown', bump);

    /* dispersão: quando você sai da aba, ela se desfaz;
       quando volta, os pontos se reúnem de novo */
    let scatter = 0, scatterTarget = 0, hiddenAt = null;
    document.addEventListener('visibilitychange', () => {
      if (document.hidden){
        hiddenAt = performance.now() / 1000;
        try{ speechSynthesis.cancel(); }catch(e){}
      } else if (hiddenAt !== null){
        const away = performance.now() / 1000 - hiddenAt;
        hiddenAt = null;
        bump();
        if (away > 6 && !reduceMotion){
          scatter = 1; scatterTarget = 0;
          const txt = away < 90
            ? Math.round(away) + ' segundos'
            : Math.round(away / 60) + ' minutos';
          if (!convo.on && oracle.state !== 'consulting' && oracle.state !== 'deep'){
            retorno.textContent = '— você ficou fora por ' + txt + '. eu me desfiz um pouco.';
            retorno.classList.add('on');
            answerBox.classList.add('on');
            const t0 = performance.now() / 1000;
            talkStart = t0; talkUntil = t0 + 1.6;
            setEstado('se recompondo');
            setTimeout(() => {
              if (!convo.on && oracle.state === 'idle' &&
                  retorno.textContent.indexOf('se desfiz') !== -1){
                retorno.classList.remove('on');
              }
            }, 7000);
          }
        }
      }
    });

    let lastT = 0;

    /* animação de abertura */
    let introStart = null;
    const INTRO_DUR = 1.6;   // duração da viagem de cada ponto
    const INTRO_TOTAL = 2.7; // atraso máximo + duração

    /* fala */
    let talkStart = -10, talkUntil = -10;

    /* motor de olhar: como uma pessoa te olhando e aguardando */
    let gazeX = 0, gazeY = 0, gazeTx = 0, gazeTy = 0.04;
    let gazeMode = 'center', gazeNext = 3, sacNext = 2;



    /* painel de pensamento: nome da mente + fase + varredura */
    const thinkEl = document.getElementById('thinking');
    const tNameEl = document.getElementById('tName');
    const tPhaseEl = document.getElementById('tPhase');
    let thinking = false, thinkTimers = [];
    const FASES = USE_GEMINI
      ? ['lendo o brief', 'consultando fontes', 'cruzando referências', 'formulando']
      : ['lendo o brief', 'cruzando referências', 'formulando'];
    function pensa(nome, fases){
      thinking = true;
      tNameEl.textContent = nome;
      tPhaseEl.textContent = (fases || FASES)[0];
      thinkEl.classList.add('on');
      thinkTimers.forEach(clearTimeout);
      thinkTimers = (fases || FASES).map((f, i) =>
        setTimeout(() => { if (thinking) tPhaseEl.textContent = f; }, i * 1900));
    }
    function paraPensa(){
      thinking = false;
      thinkEl.classList.remove('on');
      thinkTimers.forEach(clearTimeout);
      thinkTimers = [];
    }

    /* atividade cerebral: região acesa conforme o humor da fala */
    const AREAS = {
      gentil:     { k: 'rLimb', c: [255, 150, 120] },   /* límbico — emoção */
      provocador: { k: 'rPfR',  c: [255, 90, 90] },     /* pré-frontal dir — conflito */
      sereno:     { k: 'rPfL',  c: [110, 180, 255] },   /* pré-frontal esq — análise */
      enigma:     { k: 'rPost', c: [185, 130, 255] }    /* posterior dir — insight */
    };
    function acendeArea(humor){
      if (curKey !== 'cerebro') { brainArea = null; return; }
      brainArea = AREAS[humor] || AREAS.sereno;
      brainGlowT = 1;
      setTimeout(() => { brainGlowT = 0; }, 9000);
    }

    /* som do toque: intensidade suavizada e controle das notas */
    let touchS = 0, lastNoteT = 0, pmx = -1, pmy = -1;


    function frame(now){
      const t = now * 0.001;
      const dt = Math.min(0.05, t - lastT || 0.016);
      lastT = t;
      if (introStart === null) introStart = t;
      const introT = t - introStart;
      const inIntro = !reduceMotion && introT < INTRO_TOTAL;

      /* máquina de estados do oráculo */
      if (oracle.state === 'deep' && oracle.deepAns && t > oracle.until){
        const d = oracle.deepAns;
        oracle.deepAns = null;
        const marcaS = mostraFontes(d.ans.fontes);
        convo.history.push({ role: 'assistant',
          content: '[' + ARQ.nome + '] ' + d.ans.t + marcaS });
        revealLine(t, d.ans.t, d.ans.m, ARQ.nome + ' · síntese ✦');
      }
      /* conversa: a resposta chegou */
      if (oracle.state === 'convo' && convo.ans && t > oracle.until){
        const c = convo.ans;
        convo.ans = null;
        if (c.quem && c.quem !== curKey){
          /* a mente escolhida assume: metamorfose e, então, a fala */
          setArch(c.quem, false);
          syncPills();
          convo.ans = { t: c.t, m: c.m, quem: curKey, prox: c.prox,
                        gancho: c.gancho, local: c.local };
          oracle.until = t + 1.2;
        } else {
          const marca = mostraFontes(c.fontes);
          convo.history.push({ role: 'assistant',
            content: '[' + ARQ.nome + '] ' + c.t + marca });
          revealLine(t, c.t, c.m,
            ARQ.nome + (c.local ? ' · resposta local' : ''));
          /* sempre há alguém na coxia querendo entrar */
          if (c.prox) showNextCard(c.prox, c.gancho);
        }
      }
      /* silêncio prolongado: ela puxa conversa sozinha */
      if (!convo.on && !reduceMotion && oracle.state === 'idle' &&
          t - lastInteraction > 35 && introT > 20){
        startConvo(true);
      }
      /* a pergunta devolvida: uns segundos depois da leitura, ela pergunta */
      if (oracle.follow && oracle.state === 'revealing' && t > oracle.follow.at){
        const f = oracle.follow;
        oracle.follow = null;
        retorno.textContent = f.text;
        retorno.classList.add('on');
        talkStart = t;
        talkUntil = t + 1.8;
        target = { n: 'devolvendo a pergunta', gx: 0.15, gy: 0.2, sm: 0.15, br: 0.6, tl: 0.7 };
        setEstado('devolvendo a pergunta');
      }
      if (oracle.state === 'revealing' && t > oracle.resumeAt){
        oracle.state = 'idle';
        nextChange = t + 2;
      }
      oracle.agit += (oracle.agitTarget - oracle.agit) * (1 - Math.exp(-dt * 2.4));
      const agit = oracle.agit;
      /* recomposição após a dispersão */
      scatter += (scatterTarget - scatter) * (1 - Math.exp(-dt * 1.6));
      if (scatter < 0.001) scatter = 0;

      if (!reduceMotion && oracle.state === 'idle' && t > nextChange) pickIdleExpression(t);

      const ease = 1 - Math.exp(-dt * 3.2);
      cur.gx += (target.gx - cur.gx) * ease;
      cur.gy += (target.gy - cur.gy) * ease;
      cur.sm += (target.sm - cur.sm) * ease;
      cur.br += (target.br - cur.br) * ease;
      cur.tl += ((target.tl || 0) - cur.tl) * ease;
      cur.wd += ((target.wd || 0) - cur.wd) * ease;

      /* motor de olhar (em espera): olhadinhas laterais, retorno
         a você, olhares longos ocasionais e microssacadas */
      if (!reduceMotion && oracle.state === 'idle'){
        if (t > gazeNext){
          const r = Math.random();
          if (gazeMode !== 'center' && r < 0.65){
            /* volta a te olhar — o padrão de quem espera */
            gazeTx = (Math.random() - 0.5) * 0.08;
            gazeTy = 0.03 + (Math.random() - 0.5) * 0.06;
            gazeMode = 'center';
            gazeNext = t + 1.6 + Math.random() * 2.8;
          } else if (r < 0.85){
            /* olhadinha rápida para o lado */
            gazeTx = (Math.random() < 0.5 ? -1 : 1) * (0.25 + Math.random() * 0.35);
            gazeTy = (Math.random() - 0.5) * 0.3;
            gazeMode = 'glance';
            gazeNext = t + 0.5 + Math.random() * 1.1;
            if (Math.random() < 0.3 && t > blinkStart + 0.4) blinkStart = t;
          } else {
            /* olhar mais longo, pensativo */
            gazeTx = (Math.random() < 0.5 ? -1 : 1) * (0.5 + Math.random() * 0.35);
            gazeTy = -0.1 + Math.random() * 0.45;
            gazeMode = 'away';
            gazeNext = t + 1.3 + Math.random() * 1.9;
            if (Math.random() < 0.3 && t > blinkStart + 0.4) blinkStart = t;
          }
        }
        if (t > sacNext){
          gazeX += (Math.random() - 0.5) * 0.06;
          gazeY += (Math.random() - 0.5) * 0.04;
          sacNext = t + 0.4 + Math.random();
        }
      } else {
        gazeTx = 0; gazeTy = 0; gazeMode = 'center';
      }
      /* sacada rápida ao desviar; retorno mais macio */
      const gk = 1 - Math.exp(-dt * (gazeMode === 'glance' ? 9 : 4.5));
      gazeX += (gazeTx - gazeX) * gk;
      gazeY += (gazeTy - gazeY) * gk;

      const idleX = reduceMotion ? 0 : Math.sin(t * 0.13) * 0.05 + Math.sin(t * 0.041) * 0.04;
      const idleY = reduceMotion ? 0 : Math.sin(t * 0.09 + 1.7) * 0.04;
      const gx = cur.gx + idleX + gazeX;
      const gy = cur.gy + idleY + gazeY;
      const sm = Math.min(1.2, cur.sm + ARQ.baseSm);
      const br = cur.br + ARQ.baseBr + Math.max(0, gy) * 0.3;
      const bl = blinkValue(t);
      /* consultando = olhos fechados */
      const squint = Math.min(1, sm * 0.20 + bl + agit);
      /* arregalar não compete com a piscada */
      const wide = Math.max(0, cur.wd - bl * 2 - agit);
      /* inclinação da cabeça (radianos) */
      const theta = (cur.tl + ARQ.baseTl) * 0.055 + (reduceMotion ? 0 : Math.sin(t * 0.07 + 0.9) * 0.006);

      /* boca articulando: ritmo silábico com envelope suave */
      let open = 0;
      if (!reduceMotion && t < talkUntil){
        const env = Math.min(1, (t - talkStart) / 0.35, (talkUntil - t) / 0.6);
        if (env > 0){
          const syl = Math.max(0, Math.sin(t * 10.5 + Math.sin(t * 3.1) * 1.6));
          open = env * syl;
        }
      }

      /* a rotação-base respira devagar, como se ela se ajustasse */
      const persp = ARQ.persp * (reduceMotion ? 1 : 1 + Math.sin(t * 0.055 + 2.1) * 0.18);

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = inkStr;

      /* poeira ambiente no escuro */
      const fcx = offX + ARQ.A.faceC.x * scale;
      const fcy = offY + ARQ.A.faceC.y * scale;
      const orbitR = H * 0.24; // raio onde a poeira passa a orbitar
      for (let i = 0; i < ambient.length; i++){
        const g = ambient[i];
        let apx = g.fx * W, apy = g.fy * H;

        if (!reduceMotion && agit > 0.02){
          /* consulta: a poeira é atraída e passa a espiralar ao redor dela */
          const dx = fcx - apx, dy = fcy - apy;
          const dist = Math.hypot(dx, dy) || 1;
          const ux = dx / dist, uy = dy / dist;
          const inward = dist > orbitR ? 130 : 8;
          apx += (ux * inward - uy * 85) * agit * dt;
          apy += (uy * inward + ux * 85) * agit * dt;
          g.fx = apx / W; g.fy = apy / H;
        } else {
          /* volta suave para casa, com deriva orgânica ao redor dela */
          const hx = g.fx0 + (reduceMotion ? 0 : Math.sin(t * g.oscF + g.ph) * g.oscA);
          const hy = g.fy0 + (reduceMotion ? 0 : Math.cos(t * g.oscF * 1.3 + g.ph) * g.oscA);
          const back = 1 - Math.exp(-dt * 0.9);
          g.fx += (hx - g.fx) * back;
          g.fy += (hy - g.fy) * back;
          apx = g.fx * W; apy = g.fy * H;
        }

        const tw = reduceMotion ? 0 : Math.sin(t * g.f + g.ph) * 0.5 + 0.5;
        ctx.globalAlpha = Math.min(1, g.a * (0.45 + 0.55 * tw) * (1 + agit * 1.2));
        ctx.beginPath();
        ctx.arc(apx, apy, g.r, 0, 6.2832);
        ctx.fill();
      }

      let frameTouch = 0;
      const heatDecay = Math.exp(-dt * 2.4);
      brainGlow += (brainGlowT - brainGlow) * (1 - Math.exp(-dt * 1.8));
      const ehCerebro = curKey === 'cerebro';
      /* enquanto pensa, uma onda de luz varre o rosto — em todas as mentes */
      const pensando = thinking || oracle.state === 'convo' || oracle.state === 'deep';
      const ondaX = pensando ? (Math.sin(t * 1.15) * 0.5 + 0.5) * SW : -999;
      const pulso = 0.72 + 0.28 * Math.sin(t * 2.4);

      /* metamorfose: pareamento ponto a ponto entre rostos */
      const DTo = FACES[curKey].dots;
      let DFrom = null, mE = 1;
      if (morph){
        const mk = Math.min(1, (t - morph.start) / MORPH_DUR);
        mE = mk * mk * (3 - 2 * mk);
        DFrom = FACES[morph.from].dots;
        if (mk >= 1){ morph = null; DFrom = null; mE = 1; }
      }

      for (let i = 0; i < DTo.length; i++){
        const p = DTo[i];
        let sx = p.x, sy = p.y, sr = p.r, sa = p.a;
        if (DFrom){
          const q = DFrom[i];
          sx = q.x + (p.x - q.x) * mE;
          sy = q.y + (p.y - q.y) * mE;
          sr = q.r + (p.r - q.r) * mE;
          sa = q.a + (p.a - q.a) * mE;
        }

        let ex = 0, ey = 0;
        ex += (gx + persp * 0.35) * 12 * p.wIr;
        ey -= gy * 7 * p.wIr;
        ex += (gx + persp) * (9 * p.wTurn + 4 * p.wHead);
        ey -= gy * 5 * p.wHead;
        ey -= br * 7 * p.wBr;
        ex += sm * (-7 * p.wMcL + 7 * p.wMcR + (-3 * p.wChL + 3 * p.wChR));
        ey -= sm * (8 * (p.wMcL + p.wMcR) + 5 * (p.wChL + p.wChR) + 2 * p.wMo);

        /* fala: lábio inferior e queixo descem; superior sobe de leve */
        if (open > 0.001){
          ey += open * (6.5 * p.wMoLow + 4.5 * p.wJaw);
          ey -= open * 1.4 * p.wMoUp;
        }

        /* inclinação da cabeça: rotação suave ao redor do centro do rosto */
        if (theta !== 0){
          ex += -theta * (sy - ARQ.A.faceC.y) * p.wHead;
          ey +=  theta * (sx - ARQ.A.faceC.x) * p.wHead;
        }

        /* piscar/semicerrar comprime; arregalar expande */
        const lid = squint * 0.85 - wide * 0.3;
        if (lid !== 0){
          ey += (ARQ.eyeY - sy) * lid * p.wEye;
        }

        ex *= mE; ey *= mE;
        const bx = offX + (sx + ex) * scale;
        const by = offY + (sy + ey) * scale;

        let wx = 0, wy = 0, shimmer = 0;
        if (!reduceMotion){
          const ampNow = p.amp * ARQ.jit * (1 + agit * 1.7);
          /* tremor individual, agora bem contido */
          wx = Math.sin(t * p.f1 + p.ph1) * ampNow
             + agit * Math.sin(t * 7 * p.f3 + p.ph2) * 2.1;
          wy = Math.cos(t * p.f2 + p.ph2) * ampNow
             + agit * Math.cos(t * 6.3 * p.f2 + p.ph3) * 2.1;
          /* campo de fluxo coerente: ondas lentas atravessando o
             rosto — pontos vizinhos se movem juntos, como água */
          wx += Math.sin(p.x * 0.021 + p.y * 0.011 + t * 0.5)  * 0.85 * ARQ.flow
              + Math.sin(p.x * 0.006 - t * 0.21)               * 0.5 * ARQ.flow;
          wy += Math.cos(p.y * 0.019 + p.x * 0.013 + t * 0.43) * 0.85 * ARQ.flow
              + Math.cos(p.y * 0.007 + t * 0.17)               * 0.5 * ARQ.flow;
          shimmer = Math.sin(t * p.f3 + p.ph2) * 0.12 * (1 + agit * 1.6);
        }

        if (mouse.active){
          const dx = bx - mouse.x, dy = by - mouse.y;
          const dist = Math.hypot(dx, dy);
          if (dist < RADIUS && dist > 0.001){
            const push = 1 - dist / RADIUS;
            const k = push * push * FORCE;
            p.ox += (dx / dist * k - p.ox) * 0.14;
            p.oy += (dy / dist * k - p.oy) * 0.14;
            if (push > p.heat) p.heat = push;
            frameTouch += push;
          } else {
            p.ox *= 0.90; p.oy *= 0.90;
          }
        } else {
          p.ox *= 0.90; p.oy *= 0.90;
        }
        if (p.heat > 0.001) p.heat *= heatDecay;

        let px = bx + wx + p.ox;
        let py = by + wy + p.oy;

        /* abertura: interpola do caos para o rosto */
        if (inIntro){
          let k = (introT - p.d0) / INTRO_DUR;
          k = k < 0 ? 0 : (k > 1 ? 1 : k);
          const e = 1 - Math.pow(1 - k, 3); // easeOutCubic
          px = p.i0x * W + (px - p.i0x * W) * e;
          py = p.i0y * H + (py - p.i0y * H) * e;
        }

        /* dispersão pós-ausência: os pontos retornam do caos */
        if (scatter > 0.001 && !inIntro){
          const eS = 1 - scatter;
          px = p.i0x * W + (px - p.i0x * W) * eS;
          py = p.i0y * H + (py - p.i0y * H) * eS;
        }

        let alpha = sa + shimmer - (bl + agit * 0.7) * 0.5 * Math.min(1, p.wIr);
        alpha = Math.max(0.05, Math.min(1, alpha));

        /* varredura do pensamento + região cerebral acesa */
        let bg = 0, bc = null;
        if (!inIntro && !DFrom){
          if (ehCerebro && brainArea && brainGlow > 0.02){
            bg = Math.min(1, (p[brainArea.k] || 0) * brainGlow * pulso * 1.5);
            bc = brainArea.c;
          }
          if (pensando){
            const d = Math.abs((p.hx !== undefined ? p.hx : sx) - ondaX);
            if (d < 90){
              const w = (1 - d / 90) * 0.6;
              if (w > bg){
                bg = w;
                bc = ehCerebro ? [150, 200, 255]
                               : [ARQ.heatC[0], ARQ.heatC[1], ARQ.heatC[2]];
              }
            }
          }
        }
        if (bg > 0.03 && bc){
          ctx.globalAlpha = Math.max(0.05, Math.min(1, alpha + bg * 0.45));
          ctx.fillStyle = 'rgb(' +
            ((iR + (bc[0] - iR) * bg) | 0) + ',' +
            ((iG + (bc[1] - iG) * bg) | 0) + ',' +
            ((iB + (bc[2] - iB) * bg) | 0) + ')';
          if (p.ch){
            const fsb = Math.max(3.4, sr * scale * 3.1);
            ctx.font = fsb.toFixed(1) + 'px "Helvetica Neue", Arial, sans-serif';
            ctx.fillText(p.ch, px - fsb * 0.3, py + fsb * 0.34);
          } else {
            ctx.beginPath();
            ctx.arc(px, py, sr * scale * 0.9 * (1 + bg * 0.4), 0, 6.2832);
            ctx.fill();
          }
          ctx.fillStyle = inkStr;
          continue;
        }

        const h = p.heat;
        if (p.ch && !inIntro && scatter < 0.02 && !DFrom){
          /* três tamanhos, o maior nunca acima do maior ponto */
          const fs = Math.max(3.4, sr * scale * 3.1);
          ctx.font = fs.toFixed(1) + 'px "Helvetica Neue", Arial, sans-serif';
          ctx.globalAlpha = Math.max(0.05, Math.min(1, alpha * 0.82 + h * 0.25));
          if (h > 0.02){
            ctx.fillStyle = 'rgb(' + ((iR + hdR * h) | 0) + ',' +
                                     ((iG + hdG * h) | 0) + ',' +
                                     ((iB + hdB * h) | 0) + ')';
          }
          ctx.fillText(p.ch, px - fs * 0.3, py + fs * 0.34);
          if (h > 0.02) ctx.fillStyle = inkStr;
        } else if (h > 0.02){
          /* brasa: marfim → dourado, esfriando de volta */
          ctx.fillStyle = 'rgb(' + ((iR + hdR * h) | 0) + ',' +
                                   ((iG + hdG * h) | 0) + ',' +
                                   ((iB + hdB * h) | 0) + ')';
          ctx.globalAlpha = Math.min(1, alpha + h * 0.25);
          ctx.beginPath();
          ctx.arc(px, py, sr * scale * 0.9 * (1 + h * 0.35), 0, 6.2832);
          ctx.fill();
          ctx.fillStyle = inkStr;
        } else {
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.arc(px, py, sr * scale * 0.9, 0, 6.2832);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;

      /* o som do toque: sopro que acompanha, notas no movimento */
      if (mouse.active){
        if (pmx >= 0){
          const spd = Math.hypot(mouse.x - pmx, mouse.y - pmy) / Math.max(dt, 0.001);
          if (audioOn && actx && touchS > 0.03 && spd > ARQ.noteSpd && t - lastNoteT > ARQ.noteGap){
            const band = 1 - Math.min(1, Math.max(0, mouse.y / H));
            let idx = (band * (ARQ.penta.length - 1) + (Math.random() * 1.6 - 0.8)) | 0;
            idx = Math.max(0, Math.min(ARQ.penta.length - 1, idx));
            note(ARQ.penta[idx],
                 Math.min(0.22, 0.05 + spd / 5000),
                 (mouse.x / W) * 1.6 - 0.8);
            lastNoteT = t;
          }
        }
        pmx = mouse.x; pmy = mouse.y;
      } else {
        pmx = -1;
      }
      touchS += (Math.min(1, frameTouch / 26) - touchS) * (1 - Math.exp(-dt * 6));
      if (audioOn && actx && padGain){
        padGain.gain.setTargetAtTime(touchS * 0.04, actx.currentTime, 0.08);
        padFilter.frequency.setTargetAtTime(
          380 + (1 - mouse.y / Math.max(1, H)) * 1500,
          actx.currentTime, 0.12);
      }
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }
})();
</script>
</body>
